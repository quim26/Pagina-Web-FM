<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Inicio</title>
        <link rel="stylesheet" href="css/styles.css">
    </head>
    <body>
        <main>
            <div id="header"></div>

            <h1 class="slider-title">Próximos partidos</h1>
            <div class="slider-container">
                <div id="contenedor-sliders" class="slider-track">
                </div>
            </div>

            <h1 class="records-title">Récords de la temporada</h1>
            <div class="contenedor-estadisticas">
                <div id="tabla-goleadores" class="tabla-stats"></div>
                <div id="tabla-asistentes" class="tabla-stats"></div>
                <div id="tabla-zamora" class="tabla-stats"></div>
            </div>

            <h1 class="equipos">Equipos</h1>
            <section class="equips-section">
                <div id="grid-equips" class="grid-container"></div>
            </section>

            <div id="detall-equip" class="overlay-detall">
                <div class="contingut-detall">
                    <span class="tancar" onclick="tancarDetalls()">&times;</span>
                    <div id="info-entrenador"></div>
                    <div id="taula-jugadors"></div>
                </div>
            </div>

            <div id="footer"></div>
        </main>
        <script src="js/main.js"></script>
    </body>
</html>
